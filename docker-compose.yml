services:

  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: REALTEETH
      MYSQL_ROOT_PASSWORD: "0000"
    volumes:
      - ./mysql_data:/var/lib/mysql # 데이터 유실 방지를 위한 볼륨 설정

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9094'

      KAFKA_LISTENERS: 'EXTERNAL://:9092,INTERNAL://:9093,CONTROLLER://:9094'

      KAFKA_ADVERTISED_LISTENERS: 'EXTERNAL://localhost:9092,INTERNAL://kafka:9093'

      # 3. 보안 맵핑: 다 보안 없는 PLAINTEXT 방식으로 통일
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'

      # 4. 컨트롤러와 인터브로커 통신 설정
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # UI는 도커 안에 있으므로 INTERNAL 주소인 9093을 봅니다.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    depends_on:
      - kafka